<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills HUD</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    header {
      display: flex; align-items: baseline; gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid #1f242c;
      background: #0d1117;
      position: sticky; top: 0; z-index: 2;
    }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.4px; }
    header .meta { color: #7d8590; font-size: 12px; margin-left: auto; }
    .controls {
      display: flex; gap: 12px; align-items: center;
      padding: 10px 24px;
      border-bottom: 1px solid #1f242c;
      background: #0d1117;
      position: sticky; top: 44px; z-index: 2;
    }
    input[type=search] {
      flex: 1;
      padding: 7px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
    }
    input[type=search]:focus { outline: none; border-color: #58a6ff; }
    label.chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      user-select: none;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      position: sticky; top: 92px;
      background: #0d1117;
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #7d8590;
      border-bottom: 1px solid #1f242c;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th.num { text-align: right; }
    thead th.sorted { color: #e6edf3; }
    thead th.sorted::after { content: " ▾"; }
    thead th.sorted.asc::after { content: " ▴"; }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #161b22;
      vertical-align: top;
    }
    tbody tr:hover { background: #11161d; }
    tr.unused td { opacity: 0.55; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .key { font-weight: 600; color: #e6edf3; }
    .src { color: #58a6ff; font-size: 12px; }
    .desc { color: #9ba6b3; max-width: 520px; line-height: 1.4; }
    .pad { padding: 32px 24px; color: #7d8590; }
    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      background: #1f6feb22;
      color: #58a6ff;
      font-size: 11px;
      margin-left: 6px;
    }
    .badge.zero { background: #30363d44; color: #7d8590; }
  </style>
</head>
<body>
  <header>
    <h1>Skills HUD</h1>
    <span class="meta" id="meta">loading…</span>
  </header>
  <div class="controls">
    <input id="filter" type="search" placeholder="Filter by name, plugin, description…" autofocus />
    <label class="chip"><input type="checkbox" id="onlyUnused" /> Never used</label>
    <label class="chip"><input type="checkbox" id="recentOnly" /> 30d only</label>
  </div>
  <div id="grid"><div class="pad">Scanning skills…</div></div>
  <script src="/static/app.js"></script>
</body>
</html>
